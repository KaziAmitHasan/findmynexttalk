name: Update conference data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: update-conference-data
  cancel-in-progress: true

jobs:
  update-data:
    runs-on: ubuntu-latest
    environment:
      name: github-pages

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Refresh Researchr program data
        run: python3 scripts/scrape_program.py --conference fse2026 --refresh-ical

      - name: Validate data
        run: python3 scripts/validate_data.py public/data/fse2026/program.json public/data/fse2026/metadata.json

      - name: Compare iCal coverage
        run: python3 scripts/audit_data.py --program public/data/fse2026/program.json --ical conferences/fse2026/event-calendar.ics

      - name: Run Python tests
        run: python3 -m unittest discover -s tests -p '*_test.py'

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/fse2026/program.json public/data/fse2026/metadata.json conferences/fse2026/event-calendar.ics
          git diff --cached --quiet || git commit -m "Update FSE program data"
          git push

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run JavaScript tests
        run: npm run test

      - name: Build static site
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy refreshed site
        id: deployment
        uses: actions/deploy-pages@v4
